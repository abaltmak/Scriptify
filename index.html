<!DOCTYPE html>
<html>
<head>
    <title>Scriptify MVP</title>
</head>
<body>

<h1>Upload Your Handwriting</h1>

<form method="POST" enctype="multipart/form-data">
    
    <p>Upload letters (a–z):</p>
    
    {% for letter in 'abcdefghijklmnopqrstuvwxyz' %}
        {{ letter }}: <input type="file" name="{{ letter }}"><br>
    {% endfor %}

    <br>
    <p>Type your text:</p>
    <input type="text" name="text" style="width:300px;">
    
    <br><br>
    <button type="submit">Generate</button>
</form>

<hr>

<h2>Output:</h2>
<div>
    {{ output_text|safe }}
</div>

</body>
</html>
